<!DOCTYPE html>

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Organizador Personal</title>
<link rel="manifest" href="/organizador/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0f0f13;--bg2:#17171f;--bg3:#1e1e28;
    --border:rgba(255,255,255,0.07);
    --text:#f0f0f5;--text2:#8888aa;--text3:#555570;
    --accent:#7c6af7;--accent-glow:rgba(124,106,247,0.3);
    --green:#4ade80;--orange:#fb923c;--red:#f87171;--yellow:#facc15;--pink:#f472b6;--cyan:#22d3ee;
    --radius:16px;--radius-sm:10px;--shadow:0 4px 24px rgba(0,0,0,0.4);
    --font:'Outfit',sans-serif;--mono:'Space Mono',monospace;
    --nav-w:72px;--transition:0.2s cubic-bezier(.4,0,.2,1);
  }
  .light{
    --bg:#f4f4f9;--bg2:#ffffff;--bg3:#eaeaf3;
    --border:rgba(0,0,0,0.08);--text:#111118;--text2:#555570;--text3:#9999b0;
    --accent-glow:rgba(124,106,247,0.15);--shadow:0 4px 24px rgba(0,0,0,0.1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background var(--transition),color var(--transition);}
  #root{display:flex;height:100vh;}

  /* ── AUTH ── */
  .auth-page{min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden;}
  .auth-glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(124,106,247,0.12) 0%,transparent 70%);pointer-events:none;}
  .auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 24px 64px rgba(0,0,0,0.4);}
  .auth-logo{font-size:52px;font-weight:800;color:var(--accent);letter-spacing:-3px;text-align:center;margin-bottom:4px;}
  .auth-tagline{text-align:center;color:var(--text2);font-size:14px;margin-bottom:32px;}
  .auth-tabs{display:flex;background:var(--bg3);padding:4px;border-radius:12px;margin-bottom:24px;}
  .auth-tab{flex:1;padding:10px;border-radius:9px;border:none;background:none;color:var(--text2);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all var(--transition);}
  .auth-tab.active{background:var(--bg2);color:var(--text);box-shadow:var(--shadow);}
  .auth-error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--red);border-radius:10px;padding:12px;font-size:13px;margin-bottom:16px;}

  /* ── NAV ── */
  .nav{width:var(--nav-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:4px;position:fixed;left:0;top:0;bottom:0;z-index:100;}
  .nav-logo{font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-1px;margin-bottom:20px;}
  .nav-item{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);transition:all var(--transition);position:relative;border:none;background:none;}
  .nav-item:hover{background:var(--bg3);color:var(--text2);}
  .nav-item.active{background:var(--accent-glow);color:var(--accent);}
  .nav-item.active::before{content:'';position:absolute;left:-1px;width:3px;height:24px;background:var(--accent);border-radius:0 4px 4px 0;}
  .nav-bottom{margin-top:auto;display:flex;flex-direction:column;gap:4px;}

  /* ── MAIN ── */
  .main{margin-left:var(--nav-w);flex:1;overflow-y:auto;padding:32px;display:flex;flex-direction:column;gap:24px;}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .page-title{font-size:28px;font-weight:700;letter-spacing:-0.5px;}
  .page-title span{color:var(--accent);}

  /* ── CARDS ── */
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:background var(--transition);}
  .card-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:16px;}

  /* ── GRID ── */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}

  /* ── BUTTONS ── */
  .btn{padding:10px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:var(--font);font-size:14px;font-weight:600;transition:all var(--transition);display:inline-flex;align-items:center;gap:8px;}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 16px var(--accent-glow);}
  .btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);}
  .btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .btn-ghost{background:var(--bg3);color:var(--text2);}
  .btn-ghost:hover{color:var(--text);}
  .btn-danger{background:rgba(248,113,113,0.15);color:var(--red);}
  .btn-danger:hover{background:rgba(248,113,113,0.25);}
  .btn-sm{padding:6px 14px;font-size:13px;border-radius:8px;}
  .btn-icon{width:36px;height:36px;padding:0;border-radius:10px;justify-content:center;}

  /* ── BADGE ── */
  .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}

  /* ── INPUTS ── */
  .input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border var(--transition);}
  .input:focus{border-color:var(--accent);}
  .input::placeholder{color:var(--text3);}
  .select{appearance:none;cursor:pointer;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  .label{font-size:12px;font-weight:600;color:var(--text2);}

  /* ── LOADING ── */
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
  .loading-overlay{position:fixed;inset:0;z-index:9998;display:flex;align-items:center;justify-content:center;background:rgba(15,15,19,0.8);backdrop-filter:blur(4px);}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ── SPLASH ── */
  .splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;background:var(--bg);z-index:10000;}
  .splash-logo{font-size:64px;font-weight:800;color:var(--accent);letter-spacing:-4px;}
  .splash-sub{color:var(--text3);font-size:14px;}

  /* ── CALENDAR ── */
  .cal-wrapper{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,minmax(44px,1fr));gap:3px;min-width:308px;}
  .cal-day-name{text-align:center;font-size:10px;font-weight:700;color:var(--text3);padding:6px 0;text-transform:uppercase;letter-spacing:0.5px;}
  .cal-day{min-height:70px;padding:6px;border-radius:10px;background:var(--bg3);cursor:pointer;transition:all var(--transition);border:1px solid transparent;}
  .cal-day:hover{border-color:var(--accent-glow);}
  .cal-day.today{border-color:var(--accent);background:var(--accent-glow);}
  .cal-day.other-month{opacity:0.35;}
  .cal-day-num{font-size:12px;font-weight:600;color:var(--text2);}
  .cal-day.today .cal-day-num{color:var(--accent);}
  .cal-event-dot{width:100%;border-radius:3px;padding:2px 3px;font-size:9px;color:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-top:2px;}
  @media(max-width:768px){
    .cal-day{min-height:72px;padding:5px;}
    .cal-day-num{font-size:13px;font-weight:700;}
    .cal-event-dot{font-size:9px;padding:2px 3px;}
    .cal-grid{gap:4px;}
  }
  .week-grid{display:grid;grid-template-columns:48px repeat(7,1fr);}
  .week-day-head{text-align:center;padding:12px 4px;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);}
  .week-time-col{font-size:10px;color:var(--text3);font-family:var(--mono);padding-top:6px;text-align:right;padding-right:8px;}
  .week-slot{border-left:1px solid var(--border);border-bottom:1px solid rgba(255,255,255,0.03);height:40px;position:relative;cursor:pointer;}
  .week-slot:hover{background:var(--accent-glow);}
  .week-event{position:absolute;left:2px;right:2px;border-radius:6px;padding:2px 6px;font-size:11px;font-weight:600;color:#fff;overflow:hidden;cursor:pointer;z-index:2;white-space:nowrap;text-overflow:ellipsis;}

  /* ── TASKS ── */
  .task-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:var(--radius-sm);background:var(--bg3);margin-bottom:8px;border:1px solid transparent;transition:border var(--transition);}
  .task-item:hover{border-color:var(--border);}
  .task-item.done{opacity:0.5;}
  .task-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);}
  .task-check.checked{background:var(--green);border-color:var(--green);}
  .task-title{flex:1;font-size:14px;font-weight:500;}
  .task-item.done .task-title{text-decoration:line-through;color:var(--text3);}
  .task-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

  /* ── HABITS ── */
  .habit-item{display:flex;align-items:center;gap:12px;padding:16px;border-radius:var(--radius-sm);background:var(--bg3);margin-bottom:8px;flex-wrap:wrap;}
  .habit-days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;width:100%;}
  @media(max-width:480px){.habit-days{grid-template-columns:repeat(4,1fr);}}
  .habit-dot{width:28px;height:28px;border-radius:7px;background:var(--bg);border:1px solid var(--border);cursor:pointer;transition:all var(--transition);font-size:13px;display:flex;align-items:center;justify-content:center;}
  .habit-dot.done{background:var(--green);border-color:var(--green);color:#fff;}

  /* ── STATS ── */
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:8px;}
  .stat-num{font-size:36px;font-weight:800;font-family:var(--mono);letter-spacing:-2px;}
  .stat-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}
  .progress-bar{width:100%;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:3px;transition:width 0.6s cubic-bezier(.4,0,.2,1);}

  /* ── MODAL ── */
  .overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:16px;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.5);animation:slideUp 0.2s ease;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .modal-title{font-size:18px;font-weight:700;}
  @keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* ── TABS ── */
  .tabs{display:flex;gap:4px;background:var(--bg3);padding:4px;border-radius:12px;}
  .tab{flex:1;padding:8px 16px;border-radius:9px;border:none;background:none;color:var(--text2);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all var(--transition);text-align:center;}
  .tab.active{background:var(--bg2);color:var(--text);box-shadow:var(--shadow);}

  .subject-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid var(--border);}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 20px;box-shadow:var(--shadow);font-size:14px;font-weight:500;animation:slideUp 0.2s ease;display:flex;align-items:center;gap:10px;max-width:320px;}

  /* ── NOTIF BANNER ── */
  .notif-banner{background:linear-gradient(135deg,rgba(124,106,247,0.15),rgba(34,211,238,0.1));border:1px solid rgba(124,106,247,0.3);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;font-size:13px;margin-bottom:16px;}

  /* ── SUBJECT SCHEDULE ROWS ── */
  .schedule-row{background:var(--bg3);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .schedule-row-del{background:none;border:none;color:var(--red);cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;}
  .schedule-row-del:hover{background:rgba(248,113,113,0.1);}

  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  @media(max-width:768px){
    .nav{width:100%;height:64px;flex-direction:row;top:auto;bottom:0;padding:0 4px;border-right:none;border-top:1px solid var(--border);}
    .nav-logo{display:none;}
    .main{margin-left:0;margin-bottom:64px;padding:16px;}
    .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
    .nav-item.active::before{display:none;}
    .nav-bottom{margin-top:0;flex-direction:row;}
  }
  @media(max-width:1024px){
    .grid-4{grid-template-columns:repeat(2,1fr);}
    .grid-3{grid-template-columns:1fr 1fr;}
  }

  .flex{display:flex;}.flex-col{flex-direction:column;}.items-center{align-items:center;}
  .justify-between{justify-content:space-between;}.gap-2{gap:8px;}.gap-3{gap:12px;}
  .w-full{width:100%;}.text-sm{font-size:13px;}.text-xs{font-size:11px;}
  .text-accent{color:var(--accent);}.text-muted{color:var(--text2);}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
  hr.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
  
  /* Icon picker grid */
  .icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;}
  .icon-btn{width:38px;height:38px;border-radius:8px;border:2px solid transparent;background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.15s;}
  .icon-btn:hover{border-color:var(--accent-glow);}
  .icon-btn.selected{border-color:var(--accent);background:var(--accent-glow);}
  .icon-btn svg{width:18px;height:18px;stroke:var(--text2);}
  .icon-btn.selected svg{stroke:var(--accent);}
</style>
</head>

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
const NotifManager = {
  async request() {
    if(!('Notification' in window)) return 'unsupported';
    if(Notification.permission==='granted') return 'granted';
    if(Notification.permission==='denied') return 'denied';
    const res = await Notification.requestPermission();
    return res;
  },
  get permission() {
    if(!('Notification' in window)) return 'unsupported';
    return Notification.permission;
  },
  schedule(title, body, datetime, id) {
    const now = Date.now();
    const target = new Date(datetime).getTime();
    const delay = target - now;
    if(delay < 0) return;
    const key = 'notif_' + id;
    const existing = window._notifTimers || {};
    if(existing[key]) clearTimeout(existing[key]);
    window._notifTimers = existing;
    window._notifTimers[key] = setTimeout(() => {
      if(Notification.permission==='granted') {
        NotifManager._send(title, body, key);
      }
    }, Math.min(delay, 2147483647));
  },
  async _send(title, body, tag) {
    // Primero intentar con ServiceWorker (funciona en mobile)
    if(navigator.serviceWorker && navigator.serviceWorker.controller) {
      try {
        const reg = await navigator.serviceWorker.ready;
        await reg.showNotification(title, {
          body, icon: '/organizador/icons/icon-192.png',
          badge: '/organizador/icons/icon-192.png',
          tag: tag || 'org-notif',
          requireInteraction: false,
        });
        return;
      } catch(e) { console.warn('SW notif failed:', e); }
    }
    // Fallback: Notification API directa (desktop)
    try {
      new Notification(title, {
        body, icon: '/organizador/icons/icon-192.png',
        badge: '/organizador/icons/icon-192.png',
        tag: tag || 'org-notif',
        requireInteraction: false,
      });
    } catch(e) { console.warn('Notif error:', e); }
  },
  cancel(id) {
    const key = 'notif_' + id;
    if(window._notifTimers && window._notifTimers[key]) {
      clearTimeout(window._notifTimers[key]);
      delete window._notifTimers[key];
    }
  },
  scheduleAll(state) {
    if(this.permission !== 'granted') return;
    (state.events||[]).forEach(ev => {
      if(!ev.date || !ev.start) return;
      const dt = `${ev.date}T${ev.start}:00`;
      const target = new Date(dt).getTime() - 15*60*1000;
      this.schedule(`📅 ${ev.title}`, `En 15 minutos — ${ev.start}`, new Date(target), 'ev_'+ev.id);
    });
    (state.tasks||[]).forEach(t => {
      if(!t.dueDate || t.status==='completada') return;
      const dt = `${t.dueDate}T09:00:00`;
      this.schedule(`✅ Tarea: ${t.title}`, 'Vence hoy', dt, 'task_'+t.id);
    });
  }
};

function parseSubjectTime(timeStr) {
  if(!timeStr) return null;
  const m = timeStr.match(/(\d{1,2}):(\d{2})\s*[-–]\s*(\d{1,2}):(\d{2})/);
  if(!m) return null;
  return { startH:parseInt(m[1]),startM:parseInt(m[2]),endH:parseInt(m[3]),endM:parseInt(m[4]) };
}
const DAY_IDX = {'Dom':0,'Lun':1,'Mar':2,'Mié':3,'Jue':4,'Vie':5,'Sáb':6};

function isSubjectActiveOnDate(subject, dateStr) {
  if(subject.startDate && dateStr < subject.startDate) return false;
  if(subject.endDate && dateStr > subject.endDate) return false;
  return true;
}

function getSubjectSchedulesForDay(subject, dayIdx) {
  if(subject.schedules && subject.schedules.length > 0) {
    return subject.schedules.filter(sch => (sch.days||[]).some(d=>DAY_IDX[d]===dayIdx));
  }
  if((subject.days||[]).some(d=>DAY_IDX[d]===dayIdx)) {
    return [{days: subject.days, time: subject.time, room: subject.room}];
  }
  return [];
}

// ─── OVERLAP LAYOUT HELPER ────────────────────────────────────────────────────
function assignOverlapColumns(blocks) {
  if(!blocks.length) return blocks;
  const sorted = [...blocks].sort((a,b) => a.top - b.top);
  const groups = [];
  let currentGroup = [sorted[0]];
  let groupEnd = sorted[0].top + sorted[0].height;
  for(let i=1; i<sorted.length; i++) {
    const b = sorted[i];
    if(b.top < groupEnd) {
      currentGroup.push(b);
      groupEnd = Math.max(groupEnd, b.top + b.height);
    } else {
      groups.push(currentGroup);
      currentGroup = [b];
      groupEnd = b.top + b.height;
    }
  }
  groups.push(currentGroup);
  const result = [];
  for(const group of groups) {
    const n = group.length;
    group.forEach((b, idx) => {
      result.push({...b, colIndex: idx, colTotal: n});
    });
  }
  return result;
}

// ─── SHARED WEEK RENDERER (used by both FixedWeekCalendar and WeekView) ───────
// buildWeekBlocks: given dayI, dateStr, returns all blocks for that day
function buildWeekDayBlocks(subjects, activities, events, tasks, dayI, dateStr) {
  const START_H=6, END_H=24;
  const TOTAL_H = END_H - START_H;
  const ROW_H = 44;
  const TOTAL_PX = TOTAL_H * ROW_H;
  const blocks = [];

  subjects.forEach(sub => {
    if(!isSubjectActiveOnDate(sub, dateStr)) return;
    getSubjectSchedulesForDay(sub, dayI).forEach(sch => {
      const t = parseSubjectTime(sch.time);
      if(!t) return;
      const topFrac = ((t.startH + t.startM/60) - START_H) / TOTAL_H;
      const durH = (t.endH + t.endM/60) - (t.startH + t.startM/60);
      if(durH <= 0 || topFrac < 0 || topFrac >= 1) return;
      blocks.push({
        key: 's'+sub.id+'_'+t.startH+'_'+t.startM,
        bg: sub.color, label: '📚 '+sub.name, sub2: sch.room,
        top: topFrac * TOTAL_PX, height: Math.max(durH * ROW_H - 3, 18),
      });
    });
  });

  (activities||[]).forEach(a => {
    if(!(a.days||[]).some(sd=>DAY_IDX[sd]===dayI)) return;
    const t = parseSubjectTime(a.time);
    if(!t) return;
    const topFrac = ((t.startH + t.startM/60) - START_H) / TOTAL_H;
    const durH = (t.endH + t.endM/60) - (t.startH + t.startM/60);
    if(durH <= 0 || topFrac < 0 || topFrac >= 1) return;
    const icon = a.icon && !a.icon.startsWith('__svg__') ? a.icon : '🏃';
    blocks.push({
      key: 'a'+a.id, bg: a.color, label: icon+' '+a.name,
      top: topFrac * TOTAL_PX, height: Math.max(durH * ROW_H - 3, 18),
    });
  });

  (events||[]).filter(e=>e.date===dateStr).forEach(ev => {
    const startH = Number((ev.start||'0:00').split(':')[0]);
    const startM = Number((ev.start||'0:00').split(':')[1]||0);
    const endH   = Number((ev.end||'0:00').split(':')[0]);
    const endM   = Number((ev.end||'0:00').split(':')[1]||0);
    const startTotalH = startH + startM/60;
    let endTotalH = endH + endM/60;
    // Handle events crossing midnight (end < start means next day)
    if(endTotalH <= startTotalH) endTotalH = 24; // clip to end of day
    const topFrac = (startTotalH - START_H) / TOTAL_H;
    const durH = endTotalH - startTotalH;
    if(topFrac >= 1) return; // starts after grid
    const clampedTop = Math.max(topFrac, 0) * TOTAL_PX;
    const clampedDurH = Math.min(durH, END_H - Math.max(startTotalH, START_H));
    if(clampedDurH <= 0) return;
    blocks.push({
      key: 'ev'+ev.id, bg: ev.color, label: ev.title,
      top: clampedTop,
      height: Math.max(clampedDurH * ROW_H - 3, 18),
      isClickable: true, evData: ev,
    });
  });

  const taskChips = (tasks||[]).filter(t=>t.dueDate===dateStr&&t.status!=='completada').map((t,ti)=>({
    key: 'task'+t.id, bg: 'rgba(248,113,113,0.88)', label: '✅ '+t.title,
    top: ti * 22, height: 19, isTask: true, colIndex: 0, colTotal: 1,
  }));

  const timedWithCols = assignOverlapColumns(blocks);
  return [...timedWithCols, ...taskChips];
}

}

function MonthView({curr,events,subjects,activities,tasks,onDay,onEvent}) {
  const [popup, setPopup] = useState(null); // dateStr of tapped day
  const yr=curr.getFullYear(),mo=curr.getMonth();
  const fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate(),prev=new Date(yr,mo,0).getDate();
  const ts=todayStr(),cells=[];
  for(let i=fd-1;i>=0;i--)cells.push({day:prev-i,curr:false,date:`${yr}-${p2(mo)}-${p2(prev-i)}`});
  for(let d=1;d<=dim;d++)cells.push({day:d,curr:true,date:`${yr}-${p2(mo+1)}-${p2(d)}`});
  while(cells.length%7!==0){const nx=cells.length-fd-dim+1;cells.push({day:nx,curr:false,date:`${yr}-${p2(mo+2)}-${p2(nx)}`});}

  return React.createElement('div',null,
    popup && React.createElement(DayDetailPopup,{

        cells.map((c,i)=>{

          const tasksDue=(tasks||[]).filter(t=>t.dueDate===c.date&&t.status!=='completada');
          const items=[

    React.createElement('div',{style:{position:'fixed',bottom:64,left:0,right:0,zIndex:195,background:'var(--bg2)',borderRadius:'20px 20px 0 0',border:'1px solid var(--border)',borderBottom:'none',padding:16,transform:open?'translateY(0)':'translateY(100%)',transition:'transform 0.25s cubic-bezier(.4,0,.2,1)',maxHeight:'70vh',overflowY:'auto'}},
      React.createElement('div',{style:{width:36,height:4,borderRadius:2,background:'var(--border)',margin:'0 auto 16px'}}),
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}},
        NAV_ITEMS.slice(4).map(item=>React.createElement('button',{key:item.id,onClick:()=>{setPage(item.id);setOpen(false);},style:{display:'flex',flexDirection:'column',alignItems:'center',gap:6,background:page===item.id?'var(--accent-glow)':'var(--bg3)',border:page===item.id?'1px solid var(--accent)':'1px solid var(--border)',cursor:'pointer',padding:'16px 8px',color:page===item.id?'var(--accent)':'var(--text2)',fontSize:12,fontFamily:'var(--font)',fontWeight:600,borderRadius:14,transition:'all 0.2s'}},
          React.createElement(Icon,{name:item.icon,size:22}),
          React.createElement('span',null,item.label)
        )),
        React.createElement('button',{onClick:()=>{toggleTheme();setOpen(false);},style:{display:'flex',flexDirection:'column',alignItems:'center',gap:6,background:'var(--bg3)',border:'1px solid var(--border)',cursor:'pointer',padding:'16px 8px',color:'var(--text2)',fontSize:12,fontFamily:'var(--font)',fontWeight:600,borderRadius:14,transition:'all 0.2s'}},
          React.createElement(Icon,{name:theme==='dark'?'sun':'moon',size:22}),
          React.createElement('span',null,'Tema')
        )
      )
    )
  );
}

function App() {
  const [user,setUser]=useState(null);
  const [data,setDataRaw]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [toast,setToast]=useState(null);
  const [saving,setSaving]=useState(false);
  const [booting,setBooting]=useState(true);
  const [isMobile,setIsMobile]=useState(window.innerWidth<=768);
  const saveTimer=useRef(null);

  useEffect(()=>{const fn=()=>setIsMobile(window.innerWidth<=768);window.addEventListener('resize',fn);return()=>window.removeEventListener('resize',fn);},[]);

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        setUser(fbUser);
        try{
          let d=await loadData(fbUser.uid);
          if(!d){d=BLANK();await saveData(fbUser.uid,d);}
          setDataRaw(d);
          document.body.className=d.theme==='light'?'light':'';
          setTimeout(()=>NotifManager.scheduleAll(d),1000);
        }catch(e){console.error(e);}
      }else{setUser(null);setDataRaw(null);}
      setBooting(false);
    });
    return()=>unsub();
  },[]);

  const setData=useCallback(fn=>{
    setDataRaw(prev=>{
      const next=typeof fn==='function'?fn(prev):fn;
      document.body.className=next.theme==='light'?'light':'';
      clearTimeout(saveTimer.current);
      saveTimer.current=setTimeout(async()=>{
        if(!user) return;
        setSaving(true);
        try{await saveData(user.uid,next);}catch(e){console.error('Error guardando:',e);}
        setSaving(false);
      },800);
      return next;
    });
  },[user]);

  const showToast=(msg,type='success')=>setToast({msg,type});
  const handleLogout=async()=>{await auth.signOut();showToast('Sesión cerrada','info');};
  const toggleTheme=()=>data&&setData(s=>({...s,theme:s.theme==='dark'?'light':'dark'}));

  if(booting)return React.createElement('div',{className:'splash'},
    React.createElement('div',{className:'splash-logo'},'📋'),
    React.createElement('div',{className:'spinner'}),
    React.createElement('div',{className:'splash-sub'},'Cargando...')
  );

  if(!user||!data)return React.createElement(React.Fragment,null,
    React.createElement(AuthPage,{onAuth:()=>{}}),
    toast&&React.createElement(Toast,{msg:toast.msg,type:toast.type,onDone:()=>setToast(null)})
  );

  const PAGES={
    dashboard:   React.createElement(Dashboard,    {state:data,setPage,user}),
    calendar:    React.createElement(Calendar,     {state:data,setState:setData,showToast}),
    faculty:     React.createElement(Faculty,      {state:data,setState:setData,showToast}),
    activities:  React.createElement(Activities,   {state:data,setState:setData,showToast}),
    tasks:       React.createElement(Tasks,        {state:data,setState:setData,showToast}),
    habits:      React.createElement(Habits,       {state:data,setState:setData,showToast}),
    stats:       React.createElement(Stats,        {state:data}),
    focus:       React.createElement(Focus,        {state:data,setState:setData,showToast}),
    notes:       React.createElement(Notes,        {state:data,setState:setData,showToast}),
    notifications:React.createElement(NotificationsPanel,{state:data,showToast}),
    profile:     React.createElement(Profile,      {user,onLogout:handleLogout,state:data,showToast}),
  };

  return React.createElement(React.Fragment,null,
    saving&&React.createElement('div',{style:{position:'fixed',top:12,right:12,zIndex:9999,fontSize:11,color:'var(--text3)',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'4px 10px',display:'flex',alignItems:'center',gap:6}},
      React.createElement('div',{className:'spinner',style:{width:12,height:12,borderWidth:2}}),'Guardando...'
    ),
    !isMobile&&React.createElement('nav',{className:'nav'},
      React.createElement('div',{className:'nav-logo',style:{fontSize:18}},'📋'),
      NAV_ITEMS.map(item=>React.createElement('button',{key:item.id,className:`nav-item${page===item.id?' active':''}`,title:item.label,onClick:()=>setPage(item.id)},React.createElement(Icon,{name:item.icon,size:20}))),
      React.createElement('div',{className:'nav-bottom'},
        React.createElement('button',{className:'nav-item',title:'Cambiar tema',onClick:toggleTheme},
          data.theme==='dark'?React.createElement(Icon,{name:'sun',size:18}):React.createElement(Icon,{name:'moon',size:18})
        )
      )
    ),
    isMobile&&React.createElement(MobileNav,{page,setPage,toggleTheme,theme:data.theme}),
    React.createElement('main',{className:'main',style:isMobile?{marginLeft:0,marginBottom:64,padding:16}:{}},
      PAGES[page]||PAGES.dashboard
    ),
    toast&&React.createElement(Toast,{msg:toast.msg,type:toast.type||'success',onDone:()=>setToast(null)})
  );
}

// ─── PWA ─────────────────────────────────────────────────────────────────────
let deferredPrompt=null;
window._pwaReady=false;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;window._pwaReady=true;showInstallBanner();});
window.addEventListener('appinstalled',()=>{const b=document.getElementById('pwa-banner');if(b)b.remove();});
function showInstallBanner(){
  if(document.getElementById('pwa-banner')) return;
  const banner=document.createElement('div');
  banner.id='pwa-banner';
  banner.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9990;background:#7c6af7;color:#fff;padding:14px 20px;border-radius:16px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:14px;box-shadow:0 8px 32px rgba(124,106,247,0.5);white-space:nowrap;font-family:Outfit,sans-serif;';
  banner.innerHTML=`<span>📲 Instalá la app</span><button id="pwa-install-btn" style="background:rgba(255,255,255,0.22);border:none;color:#fff;padding:8px 16px;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px;font-family:Outfit,sans-serif;">Instalar</button><button id="pwa-close-btn" style="background:none;border:none;color:rgba(255,255,255,0.6);cursor:pointer;font-size:20px;line-height:1;padding:0 4px;">×</button>`;
  document.body.appendChild(banner);
  document.getElementById('pwa-install-btn').onclick=window.installPWA;
  document.getElementById('pwa-close-btn').onclick=()=>banner.remove();
}
window.installPWA=async()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;window._pwaReady=false;
  const b=document.getElementById('pwa-banner');if(b)b.remove();
  if(outcome==='accepted'){const t=document.createElement('div');t.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;background:#17171f;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px 20px;font-size:14px;font-weight:500;color:#f0f0f5;';t.textContent='✅ App instalada correctamente';document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
};

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/organizador/service-worker.js').then(reg=>reg.update()).catch(err=>console.warn('SW:',err));
  });
}
</script>
</body>
</html>
